<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글로벌 애니 주간 랭킹</title>
  <meta name="description" content="매주 자동 갱신되는 글로벌 애니메이션 인기 랭킹 — AniList · Netflix · Google Trends 기반" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="title-block">
        <h1>글로벌 애니 주간 랭킹</h1>
        <p class="subtitle">AniList · Netflix Tudum · Google Trends</p>
      </div>
      <div class="updated" id="updated">최종 갱신: —</div>
    </div>
  </header>

  <main>
    <!-- 랭킹 블록: 왼쪽 세로 탭 + 콘텐츠 -->
    <div class="rank-block">
      <nav class="rank-nav" id="rank-nav" role="tablist" aria-label="랭킹 보기">
        <button class="rank-tab active" data-view="global" role="tab">
          <span class="rank-tab-ic">🌐</span><span>글로벌 Top 20</span>
        </button>
        <button class="rank-tab" data-view="seasonal" role="tab">
          <span class="rank-tab-ic">📺</span><span>이번 분기 방영작</span>
        </button>
        <button class="rank-tab" data-view="upcoming" role="tab">
          <span class="rank-tab-ic">⏳</span><span>분기별 기대작</span>
        </button>
      </nav>

      <div class="rank-content">
        <!-- 글로벌 Top20 -->
        <section class="rank-view active" id="global-view" role="tabpanel">
          <div class="section-head">
            <h2>글로벌 Top 20</h2>
            <div class="toggle" id="sort-toggle" role="tablist" aria-label="정렬 기준">
              <button class="toggle-btn active" data-sort="trending" role="tab">트렌딩</button>
              <button class="toggle-btn" data-sort="popularity" role="tab">인기도</button>
            </div>
          </div>
          <p class="legend" aria-label="수치 설명">
            <span><b class="ic">★</b> 평점 <em>AniList 평균점수 (100점 만점)</em></span>
            <span><b class="ic">🔥</b> 트렌딩 <em>이번 주 화제성 지수</em></span>
            <span><b class="ic">👥</b> 인기도 <em>작품을 등록한 이용자 수</em></span>
          </p>
          <div class="global-grid" id="global-grid"><!-- JS 렌더 --></div>
        </section>

        <!-- 이번 분기 방영작 -->
        <section class="rank-view" id="seasonal-view" role="tabpanel" hidden>
          <div class="section-head">
            <h2>이번 분기 방영작 <span class="season-label" id="season-label"></span></h2>
            <div class="toggle" id="season-sort-toggle" role="tablist" aria-label="분기 정렬 기준">
              <button class="toggle-btn active" data-sort="trending" role="tab">트렌딩</button>
              <button class="toggle-btn" data-sort="popularity" role="tab">인기도</button>
              <button class="toggle-btn" data-sort="score" role="tab">평점</button>
            </div>
          </div>
          <div class="global-grid" id="seasonal-grid"><!-- JS 렌더 --></div>
        </section>

        <!-- 분기별 기대작 -->
        <section class="rank-view" id="upcoming-view" role="tabpanel" hidden>
          <div class="section-head">
            <h2>분기별 기대작 <span class="season-label" id="upcoming-label"></span></h2>
            <div class="toggle" id="upcoming-sort-toggle" role="tablist" aria-label="기대작 정렬 기준">
              <button class="toggle-btn active" data-sort="popularity" role="tab">기대지수</button>
              <button class="toggle-btn" data-sort="trending" role="tab">화제성</button>
              <button class="toggle-btn" data-sort="favourites" role="tab">즐겨찾기</button>
            </div>
          </div>
          <p class="legend" aria-label="수치 설명">
            <span><b class="ic">👥</b> 기대지수 <em>작품을 등록한(기다리는) 이용자 수</em></span>
            <span><b class="ic">🔥</b> 화제성 <em>최근 PV·뉴스 반응</em></span>
            <span><b class="ic">♥</b> 즐겨찾기 <em>즐겨찾기에 추가한 이용자 수</em></span>
          </p>
          <div class="chips" id="upcoming-chips"><!-- JS 렌더 (분기 선택) --></div>
          <div class="global-grid" id="upcoming-grid"><!-- JS 렌더 --></div>
        </section>
      </div>
    </div>

    <!-- 권역 탭 -->
    <section class="section" id="region-section">
      <div class="section-head">
        <h2>권역별 랭킹</h2>
      </div>
      <div class="tabs" id="region-tabs" role="tablist" aria-label="권역"><!-- JS 렌더 --></div>
      <div class="region-panel" id="region-panel"><!-- JS 렌더 --></div>
    </section>
  </main>

  <footer class="site-footer">
    <p class="sources" id="sources">데이터 출처: AniList · Netflix Tudum · Google Trends</p>
    <p class="notes" id="notes"></p>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
